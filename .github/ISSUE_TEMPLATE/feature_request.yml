name: Feature Request
description: Suggest a new OSINT module or feature
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion! Tell us what you'd like to see in PRISM.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the problem or use case.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you think it should work.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New OSINT module
        - Dashboard / frontend
        - Reports (HTML/PDF/CSV)
        - CLI
        - API
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, API docs, etc.
